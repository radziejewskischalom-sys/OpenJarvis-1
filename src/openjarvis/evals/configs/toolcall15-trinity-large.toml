# ToolCall-15 eval: Trinity-Large-Thinking (vLLM, TP=4)
# Lightweight tool calling benchmark — 15 scenarios, 5 categories
# NOTE: verify exact HuggingFace model ID before running

[meta]
name = "toolcall15-trinity-large"
description = "ToolCall-15 on trinity-ai/Trinity-Large-Thinking (temperature=0)"

[defaults]
temperature = 0.0
max_tokens = 4096

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/trinity-large/toolcall15/"
seed = 42

[[models]]
name = "trinity-ai/Trinity-Large-Thinking"
engine = "vllm"
num_gpus = 4

[[benchmarks]]
name = "toolcall15"
backend = "jarvis-direct"

# GAIA eval: gpt-5.4-2026-03-05 (cloud)
# Agentic multi-step reasoning benchmark — requires web search, file reading, code execution

[meta]
name = "gaia-gpt54"
description = "GAIA on gpt-5.4-2026-03-05 (cloud)"

[defaults]
temperature = 0.0
max_tokens = 8192

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 8
output_dir = "results/neurips-2026/baselines/gpt54/gaia/"
seed = 42

[[models]]
name = "gpt-5.4-2026-03-05"
engine = "cloud"

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "native_openhands"
max_samples = 20
tools = ["code_interpreter", "web_search", "file_read", "calculator", "think"]

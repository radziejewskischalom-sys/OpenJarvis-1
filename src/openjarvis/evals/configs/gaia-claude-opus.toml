# GAIA eval: Claude Opus 4.6 (cloud)
# Agentic multi-step reasoning benchmark — requires web search, file reading, code execution

[meta]
name = "gaia-claude-opus"
description = "GAIA on claude-opus-4-6 (cloud)"

[defaults]
temperature = 0.0
max_tokens = 8192

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 8
output_dir = "results/neurips-2026/baselines/claude-opus/gaia/"
seed = 42

[[models]]
name = "claude-opus-4-6"
engine = "cloud"

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "native_openhands"
max_samples = 20
tools = ["code_interpreter", "web_search", "file_read", "calculator", "think"]

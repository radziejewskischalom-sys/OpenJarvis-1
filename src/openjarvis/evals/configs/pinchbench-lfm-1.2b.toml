# PinchBench eval: LFM2.5-1.2B-Instruct (llamacpp, CPU)
# Agent: native_openhands — all PinchBench-required tools enabled

[meta]
name = "pinchbench-lfm-1.2b"
description = "PinchBench on liquid-ai/LFM2.5-1.2B-Instruct (llamacpp, CPU)"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "claude-opus-4-5"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/lfm-1.2b/pinchbench/"
seed = 42

[[models]]
name = "liquid-ai/LFM2.5-1.2B-Instruct"
engine = "llamacpp"

[[benchmarks]]
name = "pinchbench"
backend = "jarvis-agent"
agent = "native_openhands"
tools = [
    "think", "file_read", "file_write", "web_search", "shell_exec",
    "code_interpreter", "browser_navigate", "image_generate",
    "calculator", "http_request", "pdf_extract",
]

# LiveResearchBench: LFM2.5-1.2B-Instruct (llamacpp, CPU)

[meta]
name = "liveresearch-lfm-1.2b"
description = "LiveResearchBench deep research on liquid-ai/LFM2.5-1.2B-Instruct"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/lfm-1.2b/liveresearch/"
seed = 42

[[models]]
name = "liquid-ai/LFM2.5-1.2B-Instruct"
engine = "llamacpp"

[[benchmarks]]
name = "liveresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]

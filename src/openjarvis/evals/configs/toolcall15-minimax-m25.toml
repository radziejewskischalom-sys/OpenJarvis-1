# ToolCall-15 eval: MiniMax-M2.5 (llamacpp, 2x GPU)
# Lightweight tool calling benchmark — 15 scenarios, 5 categories

[meta]
name = "toolcall15-minimax-m25"
description = "ToolCall-15 on MiniMaxAI/MiniMax-M2.5 (temperature=0)"

[defaults]
temperature = 0.0
max_tokens = 4096

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/minimax-m25/toolcall15/"
seed = 42

[[models]]
name = "MiniMaxAI/MiniMax-M2.5"
engine = "llamacpp"
num_gpus = 2

[[benchmarks]]
name = "toolcall15"
backend = "jarvis-direct"

# LiveResearchBench: gpt-5.4-2026-03-05 (cloud)

[meta]
name = "liveresearch-gpt54"
description = "LiveResearchBench deep research on gpt-5.4-2026-03-05"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 8
output_dir = "results/neurips-2026/baselines/gpt54/liveresearch/"
seed = 42

[[models]]
name = "gpt-5.4-2026-03-05"
engine = "cloud"

[[benchmarks]]
name = "liveresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]

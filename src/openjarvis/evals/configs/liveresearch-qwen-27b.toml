# LiveResearchBench: Qwen3.5-27B-FP8 (vLLM, TP=2)

[meta]
name = "liveresearch-qwen-27b"
description = "LiveResearchBench deep research on Qwen/Qwen3.5-27B-FP8"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/qwen-27b/liveresearch/"
seed = 42

[[models]]
name = "Qwen/Qwen3.5-27B-FP8"
engine = "vllm"
num_gpus = 2

[[benchmarks]]
name = "liveresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]

# LiveResearchBench: Kimi-K2.5 (llamacpp, 2x GPU)
# Kimi-K2.5 thinking mode: temperature=1.0

[meta]
name = "liveresearch-kimi-k25"
description = "LiveResearchBench deep research on moonshotai/Kimi-K2.5"

[defaults]
temperature = 1.0
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/kimi-k25/liveresearch/"
seed = 42

[[models]]
name = "moonshotai/Kimi-K2.5"
engine = "llamacpp"
num_gpus = 2

[[benchmarks]]
name = "liveresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]

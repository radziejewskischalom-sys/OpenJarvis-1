# ToolCall-15 eval: Kimi-K2.5 (llamacpp, 2x GPU)
# Lightweight tool calling benchmark — 15 scenarios, 5 categories
# Kimi-K2.5 thinking mode: temperature=1.0

[meta]
name = "toolcall15-kimi-k25"
description = "ToolCall-15 on moonshotai/Kimi-K2.5 (temperature=1.0)"

[defaults]
temperature = 1.0
max_tokens = 4096

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/kimi-k25/toolcall15/"
seed = 42

[[models]]
name = "moonshotai/Kimi-K2.5"
engine = "llamacpp"
num_gpus = 2

[[benchmarks]]
name = "toolcall15"
backend = "jarvis-direct"

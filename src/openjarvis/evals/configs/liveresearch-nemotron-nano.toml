# LiveResearchBench: NVIDIA-Nemotron-3-Nano-30B-A3B-FP8 (vLLM, 1 GPU)

[meta]
name = "liveresearch-nemotron-nano"
description = "LiveResearchBench deep research on nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/nemotron-nano/liveresearch/"
seed = 42

[[models]]
name = "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8"
engine = "vllm"
num_gpus = 1

[[benchmarks]]
name = "liveresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]

# LiveResearchBench: Gemini 3.1 Pro Preview (cloud)

[meta]
name = "liveresearch-gemini-31-pro"
description = "LiveResearchBench deep research on gemini-3.1-pro-preview"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 8
output_dir = "results/neurips-2026/baselines/gemini-31-pro/liveresearch/"
seed = 42

[[models]]
name = "gemini-3.1-pro-preview"
engine = "cloud"

[[benchmarks]]
name = "liveresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]

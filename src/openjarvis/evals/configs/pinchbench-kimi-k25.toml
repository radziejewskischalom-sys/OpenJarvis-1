# PinchBench eval: Kimi-K2.5 (llamacpp, 2x GPU)
# Agent: native_openhands — all PinchBench-required tools enabled
# Kimi-K2.5 thinking mode: temperature=1.0

[meta]
name = "pinchbench-kimi-k25"
description = "PinchBench on moonshotai/Kimi-K2.5 (llamacpp, 2x GPU)"

[defaults]
temperature = 1.0
max_tokens = 8192

[judge]
model = "claude-opus-4-5"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/kimi-k25/pinchbench/"
seed = 42

[[models]]
name = "moonshotai/Kimi-K2.5"
engine = "llamacpp"
num_gpus = 2

[[benchmarks]]
name = "pinchbench"
backend = "jarvis-agent"
agent = "native_openhands"
tools = [
    "think", "file_read", "file_write", "web_search", "shell_exec",
    "code_interpreter", "browser_navigate", "image_generate",
    "calculator", "http_request", "pdf_extract",
]

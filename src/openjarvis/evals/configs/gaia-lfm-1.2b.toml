# GAIA eval: LFM2.5-1.2B-Instruct (llamacpp, CPU)
# Agentic multi-step reasoning benchmark — requires web search, file reading, code execution

[meta]
name = "gaia-lfm-1.2b"
description = "GAIA on liquid-ai/LFM2.5-1.2B-Instruct (llamacpp, CPU)"

[defaults]
temperature = 0.0
max_tokens = 8192

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/lfm-1.2b/gaia/"
seed = 42

[[models]]
name = "liquid-ai/LFM2.5-1.2B-Instruct"
engine = "llamacpp"

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "native_openhands"
max_samples = 20
tools = ["code_interpreter", "web_search", "file_read", "calculator", "think"]

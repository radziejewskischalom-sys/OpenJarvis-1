# PinchBench eval: MiniMax-M2.5 (llamacpp, 2x GPU)
# Agent: native_openhands — all PinchBench-required tools enabled

[meta]
name = "pinchbench-minimax-m25"
description = "PinchBench on MiniMaxAI/MiniMax-M2.5 (llamacpp, 2x GPU)"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "claude-opus-4-5"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/minimax-m25/pinchbench/"
seed = 42

[[models]]
name = "MiniMaxAI/MiniMax-M2.5"
engine = "llamacpp"
num_gpus = 2

[[benchmarks]]
name = "pinchbench"
backend = "jarvis-agent"
agent = "native_openhands"
tools = [
    "think", "file_read", "file_write", "web_search", "shell_exec",
    "code_interpreter", "browser_navigate", "image_generate",
    "calculator", "http_request", "pdf_extract",
]

# GAIA eval: Trinity-Large-Thinking (vLLM, TP=4)
# Agentic multi-step reasoning benchmark — requires web search, file reading, code execution
# NOTE: verify exact HuggingFace model ID before running

[meta]
name = "gaia-trinity-large"
description = "GAIA on trinity-ai/Trinity-Large-Thinking (vLLM, TP=4)"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/trinity-large/gaia/"
seed = 42

[[models]]
name = "trinity-ai/Trinity-Large-Thinking"
engine = "vllm"
num_gpus = 4

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "native_openhands"
max_samples = 20
tools = ["code_interpreter", "web_search", "file_read", "calculator", "think"]

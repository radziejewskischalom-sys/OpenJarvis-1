# GAIA eval: Gemini 3.1 Pro Preview (cloud)
# Agentic multi-step reasoning benchmark — requires web search, file reading, code execution

[meta]
name = "gaia-gemini-31-pro"
description = "GAIA on gemini-3.1-pro-preview (cloud)"

[defaults]
temperature = 0.0
max_tokens = 8192

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 8
output_dir = "results/neurips-2026/baselines/gemini-31-pro/gaia/"
seed = 42

[[models]]
name = "gemini-3.1-pro-preview"
engine = "cloud"

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "native_openhands"
max_samples = 20
tools = ["code_interpreter", "web_search", "file_read", "calculator", "think"]

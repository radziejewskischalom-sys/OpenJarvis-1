# GAIA eval: Qwen3.5-27B-FP8 (vLLM, TP=2)
# Agentic multi-step reasoning benchmark — requires web search, file reading, code execution

[meta]
name = "gaia-qwen-27b"
description = "GAIA on Qwen/Qwen3.5-27B-FP8 (vLLM, TP=2)"

[defaults]
temperature = 0.0
max_tokens = 8192

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/qwen-27b/gaia/"
seed = 42

[[models]]
name = "Qwen/Qwen3.5-27B-FP8"
engine = "vllm"
num_gpus = 2

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "native_openhands"
max_samples = 20
tools = ["code_interpreter", "web_search", "file_read", "calculator", "think"]
